<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SI / NO – Lectura facial</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #00ff6a;
      --neon-dim: rgba(0, 255, 106, 0.35);
      --neon-soft: rgba(0, 255, 106, 0.12);
      --bg: #04140a;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(ellipse at center, #062014 0%, #000 70%),
        #000;
      color: var(--neon);
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* --- Layout principal --- */
    #app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      padding: 28px;
      box-sizing: border-box;
    }

    /* === Marco cyberpunk === */
    .cyber-frame {
      position: relative;
      background: rgba(0, 20, 10, 0.6);
      border: 1px solid var(--neon-dim);
      box-shadow:
        inset 0 0 30px rgba(0, 255, 106, 0.08),
        0 0 30px rgba(0, 255, 106, 0.15);
    }
    .cyber-frame::before,
    .cyber-frame::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }
    /* Bordes con corte en esquinas (efecto chamfered) */
    .cyber-frame::before {
      inset: 0;
      background:
        linear-gradient(var(--neon), var(--neon)) top left / 60px 3px no-repeat,
        linear-gradient(var(--neon), var(--neon)) top left / 3px 60px no-repeat,
        linear-gradient(var(--neon), var(--neon)) top right / 60px 3px no-repeat,
        linear-gradient(var(--neon), var(--neon)) top right / 3px 60px no-repeat,
        linear-gradient(var(--neon), var(--neon)) bottom left / 60px 3px no-repeat,
        linear-gradient(var(--neon), var(--neon)) bottom left / 3px 60px no-repeat,
        linear-gradient(var(--neon), var(--neon)) bottom right / 60px 3px no-repeat,
        linear-gradient(var(--neon), var(--neon)) bottom right / 3px 60px no-repeat;
      filter: drop-shadow(0 0 6px var(--neon));
    }
    /* Muescas/cortes diagonales en cada esquina */
    .cyber-frame .notch {
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--bg);
      border: 0;
      transform: rotate(45deg);
      box-shadow: 0 0 0 1px var(--neon);
    }
    .notch.tl { top: -11px; left: -11px; }
    .notch.tr { top: -11px; right: -11px; }
    .notch.bl { bottom: -11px; left: -11px; }
    .notch.br { bottom: -11px; right: -11px; }

    .cyber-frame .frame-tag {
      position: absolute;
      top: -10px;
      left: 24px;
      background: var(--bg);
      padding: 0 10px;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--neon);
      text-shadow: 0 0 6px var(--neon);
    }

    /* === Cámara === */
    #camera {
      position: relative;
      overflow: hidden;
    }
    #videoElement {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      filter: contrast(1.05) saturate(0.9) brightness(0.95);
      z-index: 1;
    }
    #faceMeshCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      z-index: 2;
      pointer-events: none;
    }

    /* Línea de escaneo sutil */
    .scan {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 2px;
      background: var(--neon);
      box-shadow: 0 0 10px var(--neon);
      animation: scan 4s linear infinite;
      z-index: 3;
      opacity: 0.55;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 0%; opacity: 0; }
      8%   { opacity: 0.6; }
      92%  { opacity: 0.6; }
      100% { top: 100%; opacity: 0; }
    }

    /* Cartel grande SI / NO */
    #verdict {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      font-weight: 900;
      font-size: clamp(120px, 18vw, 260px);
      letter-spacing: 10px;
      text-align: center;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 0 30px rgba(0,0,0,0.85);
      transition: color 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
      pointer-events: none;
      user-select: none;
      opacity: 0;
    }
    #verdict.yes { color: var(--neon); opacity: 1; transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 24px var(--neon); }
    #verdict.no  { color: #ff3b30; opacity: 1; transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 24px #ff3b30; }
    #verdict.neutral { opacity: 0; }

    /* Panel lateral */
    #side {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px 22px;
    }
    #side h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 6px;
      color: var(--neon);
      text-shadow: 0 0 6px var(--neon);
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--neon-dim);
      background: var(--neon-soft);
    }
    .stat .label { font-size: 10px; letter-spacing: 3px; opacity: 0.7; }
    .stat .value { font-size: 26px; letter-spacing: 2px; transition: color 0.2s ease; }
    .stat .value.yes { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    .stat .value.no  { color: #ff3b30; text-shadow: 0 0 10px #ff3b30; }

    .record-btn {
      margin-top: auto;
      position: relative;
      padding: 18px 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--neon);
      background: linear-gradient(180deg, rgba(0,255,106,0.15), rgba(0,255,106,0.04));
      border: 1px solid var(--neon);
      cursor: pointer;
      text-transform: uppercase;
      box-shadow:
        inset 0 0 14px rgba(0, 255, 106, 0.18),
        0 0 14px rgba(0, 255, 106, 0.25);
      transition: transform 0.1s ease, background 0.2s ease;
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    }
    .record-btn:hover { background: linear-gradient(180deg, rgba(0,255,106,0.25), rgba(0,255,106,0.08)); }
    .record-btn:active { transform: translateY(1px); }
    .record-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .record-btn.recording {
      color: #ff3b30;
      border-color: #ff3b30;
      box-shadow: inset 0 0 14px rgba(255, 59, 48, 0.25), 0 0 18px rgba(255, 59, 48, 0.35);
      background: linear-gradient(180deg, rgba(255, 59, 48, 0.18), rgba(255, 59, 48, 0.04));
    }

    .countdown {
      font-size: 56px;
      letter-spacing: 4px;
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--neon-dim);
      color: var(--neon);
      text-shadow: 0 0 12px var(--neon);
      display: none;
    }
    .countdown.active { display: block; }

    .locked-result {
      padding: 14px;
      border: 1px solid var(--neon-dim);
      text-align: center;
      font-size: 28px;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.85);
      min-height: 36px;
    }
    .locked-result.yes { color: var(--neon); border-color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    .locked-result.no  { color: #ff3b30; border-color: #ff3b30; text-shadow: 0 0 10px #ff3b30; }

    #status {
      position: absolute;
      top: 14px;
      left: 16px;
      z-index: 6;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--neon);
      background: rgba(0, 20, 10, 0.65);
      padding: 5px 10px;
      border: 1px solid var(--neon-dim);
      pointer-events: none;
    }
    #status.error { color: #ff3b30; border-color: #ff3b30; }

    .rec-dot {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #ff3b30;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border: 1px solid #ff3b30;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .rec-dot.active { opacity: 1; }
    .rec-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff3b30;
      box-shadow: 0 0 8px #ff3b30;
      animation: blink 0.8s linear infinite;
    }
    @keyframes blink { 50% { opacity: 0.2; } }

    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; padding: 14px; gap: 14px; }
      #side { flex-direction: row; flex-wrap: wrap; padding: 16px; }
      .record-btn { flex: 1; }
      .stat { flex: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="camera" class="cyber-frame">
      <span class="notch tl"></span>
      <span class="notch tr"></span>
      <span class="notch bl"></span>
      <span class="notch br"></span>
      <span class="frame-tag">CAM_01 / BIO-READ</span>

      <video id="videoElement" autoplay playsinline muted></video>
      <canvas id="faceMeshCanvas" aria-hidden="true"></canvas>
      <div class="scan"></div>
      <div id="verdict"></div>
      <div id="status">iniciando…</div>
      <div id="recDot" class="rec-dot">REC</div>
    </section>

    <aside id="side" class="cyber-frame">
      <span class="notch tl"></span>
      <span class="notch tr"></span>
      <span class="notch bl"></span>
      <span class="notch br"></span>
      <span class="frame-tag">PANEL</span>

      <h2>LECTURA FACIAL</h2>

      <div class="stat">
        <div class="label">EN VIVO</div>
        <div class="value" id="liveValue">—</div>
      </div>

      <div class="stat">
        <div class="label">RESPUESTA GRABADA</div>
        <div class="locked-result" id="lockedResult">—</div>
      </div>

      <div class="countdown" id="countdown">3</div>

      <button id="recordBtn" class="record-btn" type="button">▶ GRABAR RESPUESTA</button>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    const video = document.getElementById('videoElement');
    const meshCanvas = document.getElementById('faceMeshCanvas');
    const verdictEl = document.getElementById('verdict');
    const statusEl = document.getElementById('status');
    const liveValueEl = document.getElementById('liveValue');
    const lockedResultEl = document.getElementById('lockedResult');
    const recordBtn = document.getElementById('recordBtn');
    const countdownEl = document.getElementById('countdown');
    const recDot = document.getElementById('recDot');
    const MODEL_URL = './weights';

    function setStatus(msg, isError) {
      if (!statusEl) return;
      statusEl.textContent = msg;
      statusEl.classList.toggle('error', !!isError);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;
        await new Promise(resolve => {
          if (video.readyState >= 2 && video.videoWidth > 0) return resolve();
          video.addEventListener('loadedmetadata', () => resolve(), { once: true });
        });
        meshCanvas.width = video.videoWidth;
        meshCanvas.height = video.videoHeight;
        return true;
      } catch (err) {
        console.error('Cámara:', err);
        setStatus('cámara denegada o no disponible', true);
        return false;
      }
    }

    let faceMeshReady = false;
    async function initFaceMesh() {
      if (location.protocol === 'file:') {
        setStatus('abre con http://localhost (no file://)', true);
        return false;
      }
      if (typeof faceapi === 'undefined') {
        setStatus('face-api no cargó (red/bloqueador)', true);
        return false;
      }
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.loadFaceLandmarkModel(MODEL_URL)
        ]);
        faceMeshReady = true;
        return true;
      } catch (err) {
        console.error('modelos:', err);
        setStatus('modelos no cargaron (revisa /weights)', true);
        return false;
      }
    }

    // ---------- Detección de SÍ / NO ----------
    // Enfoque: span (rango max-min) de la nariz en los últimos N frames.
    // Sin suavizado. Sin ventana de tiempo. Sin hysteresis.
    // X span > Y span  →  NO  (cabezada horizontal)
    // Y span > X span  →  SÍ  (cabezada vertical)

    const MAX_PTS = 22;
    const nosePts  = [];   // {x, y, faceW}  – ventana en vivo
    const recordTrail = []; // igual, acumulado durante grabación

    function addNose(x, y, faceW) {
      const pt = { x, y, faceW };
      nosePts.push(pt);
      if (nosePts.length > MAX_PTS) nosePts.shift();
      if (recording) recordTrail.push(pt);
    }

    function span(arr) {
      let mn = Infinity, mx = -Infinity;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] < mn) mn = arr[i];
        if (arr[i] > mx) mx = arr[i];
      }
      return mx - mn;
    }

    function classifyPts(pts) {
      if (pts.length < 5) return { verdict: 'NEUTRAL', xSpan: 0, ySpan: 0 };
      const faceW = pts[pts.length - 1].faceW || 100;
      const threshold = Math.max(6, faceW * 0.05);  // 5% del ancho de cara
      const xSpan = span(pts.map(p => p.x));
      const ySpan = span(pts.map(p => p.y));

      let verdict = 'NEUTRAL';
      if (xSpan >= threshold || ySpan >= threshold) {
        verdict = xSpan >= ySpan ? 'NO' : 'YES';
      }
      return { verdict, xSpan: Math.round(xSpan), ySpan: Math.round(ySpan), threshold: Math.round(threshold) };
    }

    let lastVerdict = 'NEUTRAL';

    function paintVerdict(kind) {
      if (kind === lastVerdict) return;
      lastVerdict = kind;
      verdictEl.classList.remove('yes', 'no', 'neutral');
      liveValueEl.classList.remove('yes', 'no');
      if (kind === 'YES') {
        verdictEl.textContent = 'SÍ';
        verdictEl.classList.add('yes');
        liveValueEl.textContent = 'SÍ';
        liveValueEl.classList.add('yes');
      } else if (kind === 'NO') {
        verdictEl.textContent = 'NO';
        verdictEl.classList.add('no');
        liveValueEl.textContent = 'NO';
        liveValueEl.classList.add('no');
      } else {
        verdictEl.textContent = '';
        verdictEl.classList.add('neutral');
        liveValueEl.textContent = '—';
      }
    }

    function setLockedResult(kind) {
      lockedResultEl.classList.remove('yes', 'no');
      if (kind === 'YES') {
        lockedResultEl.textContent = 'SÍ';
        lockedResultEl.classList.add('yes');
      } else if (kind === 'NO') {
        lockedResultEl.textContent = 'NO';
        lockedResultEl.classList.add('no');
      } else {
        lockedResultEl.textContent = 'INDETERMINADO';
      }
    }

    // ---------- Modo grabación ----------
    let recording = false;
    let countdownTimer = null;

    function startRecording() {
      if (recording) return;
      recording = true;
      recordTrail.length = 0;
      recordBtn.disabled = true;
      recordBtn.classList.add('recording');
      recordBtn.textContent = '● GRABANDO…';
      recDot.classList.add('active');
      countdownEl.classList.add('active');

      let secs = 3;
      countdownEl.textContent = secs;
      countdownTimer = setInterval(() => {
        secs -= 1;
        if (secs <= 0) {
          countdownEl.textContent = '0';
          clearInterval(countdownTimer);
          countdownTimer = null;
          finishRecording();
        } else {
          countdownEl.textContent = secs;
        }
      }, 1000);
    }

    function finishRecording() {
      recording = false;
      countdownEl.classList.remove('active');
      recDot.classList.remove('active');
      recordBtn.classList.remove('recording');
      recordBtn.disabled = false;
      recordBtn.textContent = '▶ GRABAR RESPUESTA';

      // Analiza toda la trayectoria de 3s
      const { verdict: final } = classifyPts(recordTrail);
      setLockedResult(final);
    }

    recordBtn.addEventListener('click', startRecording);

    // ---------- Dibujo de landmarks ----------
    function drawLandmarks(ctx, detection, w, h) {
      const positions = detection.landmarks.positions;
      const box = detection.detection?.box;
      const first = positions[0];
      const normalized = first && first.x <= 1 && first.y <= 1;
      const boxRel = first && box && first.x >= 0 && first.x <= box.width && first.y >= 0 && first.y <= box.height;

      ctx.save();
      ctx.fillStyle = 'rgba(0, 255, 106, 0.9)';
      ctx.shadowColor = 'rgba(0, 255, 106, 0.9)';
      ctx.shadowBlur = 6;
      for (let i = 0; i < positions.length; i++) {
        let x = positions[i].x;
        let y = positions[i].y;
        if (normalized) { x *= w; y *= h; }
        else if (boxRel) { x += box.x; y += box.y; }
        ctx.beginPath();
        ctx.arc(x, y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function getNoseInPixels(detection, w, h) {
      const positions = detection.landmarks.positions;
      const nose = positions[30];
      if (!nose) return null;
      const box = detection.detection?.box;
      const normalized = nose.x <= 1 && nose.y <= 1;
      const boxRel = box && nose.x >= 0 && nose.x <= box.width && nose.y >= 0 && nose.y <= box.height;
      let x = nose.x, y = nose.y;
      if (normalized) { x *= w; y *= h; }
      else if (boxRel) { x += box.x; y += box.y; }
      return { x, y, faceW: box ? box.width : w };
    }

    // ---------- Loop ----------
    const detectorOpts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.2 });

    async function loop() {
      if (!faceMeshReady || video.readyState < 2 || !video.videoWidth) {
        return requestAnimationFrame(loop);
      }
      const w = video.videoWidth;
      const h = video.videoHeight;
      if (meshCanvas.width !== w || meshCanvas.height !== h) {
        meshCanvas.width = w;
        meshCanvas.height = h;
      }
      const ctx = meshCanvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);

      const results = await faceapi.detectAllFaces(video, detectorOpts).withFaceLandmarks();

      if (results.length > 0) {
        const det = results[0];
        drawLandmarks(ctx, det, w, h);
        const nose = getNoseInPixels(det, w, h);
        if (nose) addNose(nose.x, nose.y, nose.faceW);
        const { verdict, xSpan, ySpan, threshold } = classifyPts(nosePts);
        paintVerdict(verdict);
        setStatus('cara · X:' + xSpan + ' Y:' + ySpan + ' min:' + threshold);
      } else {
        nosePts.length = 0;
        lastVerdict = 'NEUTRAL';
        paintVerdict('NEUTRAL');
        setStatus('sin cara');
      }

      requestAnimationFrame(loop);
    }

    (async function main() {
      setStatus('pidiendo cámara…');
      const camOk = await startCamera();
      if (!camOk) return;
      setStatus('cargando modelos…');
      const modelOk = await initFaceMesh();
      if (!modelOk) return;
      setStatus('listo');
      loop();
    })();
  </script>
</body>
</html>
